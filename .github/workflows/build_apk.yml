name: Build APKs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ──────────────────────────────────────────────
  # Job 1: Flutter APK
  # ──────────────────────────────────────────────
  build-flutter-apk:
    name: Build Flutter Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Generate android/ platform folder (no-overwrite)
        run: |
          flutter create \
            --project-name payment_verifier \
            --org com.paymentverifier \
            --platforms android \
            --no-overwrite \
            .

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Flutter debug APK
        run: flutter build apk --debug

      - name: Upload Flutter debug APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

  # ──────────────────────────────────────────────
  # Job 2: Kotlin APK
  # ──────────────────────────────────────────────
  build-kotlin-apk:
    name: Build Kotlin Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant gradlew execute permission
        run: chmod +x PaymentVerifier/gradlew

      - name: Build Kotlin debug APK
        working-directory: PaymentVerifier
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Kotlin debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-debug-apk
          path: PaymentVerifier/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
